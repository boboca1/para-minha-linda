<style>
    /* Estilo da Galeria de Fotos */
    .galeria {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        width: 90%;
        max-width: 800px;
        margin: 30px auto;
        padding-bottom: 50px;
    }

    .galeria img {
        width: 100%;
        height: 200px;
        object-fit: cover; /* Faz a foto preencher o quadrado sem distorcer */
        border-radius: 15px;
        border: 4px solid white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }

    .galeria img:hover {
        transform: scale(1.05); /* Efeito de zoom quando passa o mouse/dedo */
    }

    /* Ajuste para telas de celular */
    @media (max-width: 600px) {
        .galeria {
            grid-template-columns: repeat(2, 1fr); /* 2 fotos por linha no celular */
        }
    }
</style>

<div class="galeria">
    <img src="foto1.jpg" alt="Nossa Foto 1">
    <img src="foto2.jpg" alt="Nossa Foto 2">
    <img src="foto3.jpg" alt="Nossa Foto 3">
    <img src="foto4.jpg" alt="Nossa Foto 4">
    <img src="foto5.jpg" alt="Nossa Foto 5">
    <img src="foto6.jpg" alt="Nossa Foto 6">
    <img src="foto7.jpg" alt="Nossa Foto 7">
</div>
